<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2048 Game</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: whitesmoke;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  #game {
    width: 320px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    background: #bbd0e2;
    padding: 10px;
    border-radius: 10px;
  }

  .cell {
    width: 70px;
    height: 70px;
    background: #dbe7f3;
    border-radius: 8px;
    font-size: 24px;
    font-weight: bold;
    line-height: 70px;
    color: white;
  }

  #message {
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
  }

  #restartBtn {
    display: none;
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #restartBtn:hover {
    background: #357abd;
  }
  
  nav{
 color:coral;
    padding: 10px;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    
  }
  nav a{
    color: black;
    padding: 10px;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
}

nav a:hover{
    background-color: lightblue;
}
</style>
</head>
<body>

<h1>2048</h1>
<H2>Try my favorite game growing up!</H2>
<div id="game"></div>
<div id="message"></div>
<button id="restartBtn" onclick="init()">Restart Game</button>

<script>
let grid = [];
const size = 4;
const gameDiv = document.getElementById("game");
const messageDiv = document.getElementById("message");
const restartBtn = document.getElementById("restartBtn");

function init() {
  grid = Array.from({ length: size }, () => Array(size).fill(0));
  messageDiv.textContent = "";
  restartBtn.style.display = "none";
  document.addEventListener("keydown", handleKey);
  addNumber();
  addNumber();
  draw();
}

function draw() {
  gameDiv.innerHTML = "";
  grid.forEach(row => {
    row.forEach(cell => {
      const div = document.createElement("div");
      div.className = "cell";
      if (cell !== 0) {
        div.textContent = cell;
        div.style.background = getColor(cell);
      }
      gameDiv.appendChild(div);
    });
  });
}

function getColor(num) {
  if (num === 2048) return "#FFD700"; // gold

  let intensity = Math.min(255, 50 + Math.log2(num) * 20);
  return `rgb(0, 0, ${intensity})`;
}

function addNumber() {
  let empty = [];
  grid.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell === 0) empty.push({ r, c });
    });
  });

  if (empty.length === 0) return;

  let { r, c } = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  let arr = row.filter(val => val);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      arr[i + 1] = 0;
    }
  }
  arr = arr.filter(val => val);
  while (arr.length < size) arr.push(0);
  return arr;
}

function rotate() {
  let newGrid = Array.from({ length: size }, () => Array(size).fill(0));
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      newGrid[c][size - 1 - r] = grid[r][c];
    }
  }
  grid = newGrid;
}

function move(direction) {
  let old = JSON.stringify(grid);

  for (let i = 0; i < direction; i++) rotate();

  for (let i = 0; i < size; i++) {
    grid[i] = slide(grid[i]);
  }

  for (let i = 0; i < (4 - direction) % 4; i++) rotate();

  if (JSON.stringify(grid) !== old) {
    addNumber();
    draw();
    checkGame();
  }
}

function checkGame() {
  if (grid.flat().includes(2048)) {
    messageDiv.textContent = "🎉 You Win!";
    endGame();
    return;
  }

  if (!grid.flat().includes(0)) {
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (
          (grid[r][c] === grid[r][c + 1]) ||
          (grid[r][c] === (grid[r + 1] || [])[c])
        ) {
          return;
        }
      }
    }
    messageDiv.textContent = "💀 Game Over!";
    endGame();
  }
}

function endGame() {
  document.removeEventListener("keydown", handleKey);
  restartBtn.style.display = "inline-block";
}

function handleKey(e) {
  switch (e.key) {
    case "ArrowLeft": move(0); break;
    case "ArrowUp": move(3); break;    // FIXED
    case "ArrowRight": move(2); break;
    case "ArrowDown": move(1); break;  // FIXED
  }
}

init();
</script>
 <nav >
        <a href="index.html">My Professional Life</a>
        <a href="FromScratch.html">My Personal Life</a>
    </nav>

</body>
</html>
